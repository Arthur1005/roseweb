<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arthur Lin — Portfolio</title>
  <link rel="stylesheet" href="../css/style.css">
</head>

<body>
  <div class="page-wrap">
    <nav>
      <img  alt="logo" width="24px" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSU8u8tpVE9yl1Jj0L81O7deRDfyW-yOXX-Kw&s">
      <div   class="pageNav">
        <button onclick="location.href='project.html'">Project</button>
        <button id="contactOpen">Contact</button>
      </div>
    </nav>
    <main>
      <button id="reel">REEL</button>   <!--要改位置-->
    </main>

    </div>
<!-- Contact panel -->
<aside id="contacts" class="contacts">
<div class="contactsTitle">
    <button id="contactClose">Close</button>
    <h6 style="text-decoration: bold;">Contact</h6>
</div>
<div class="contactFormSpace">
    <form id="myForm">
    <div class="contactForm">
        <label>Name</label>
        <input type="text" placeholder="Your name" required>
    </div>
    <div class="contactForm">
        <label>Email</label>
        <input type="email" placeholder="Your email" required>
    </div>
    <div class="contactForm">
        <label>Message</label>
        <textarea placeholder="Say hello..." required></textarea>
    </div>
    <button class="contactSubmitButton">Submit</button>
    </form>
</div>
</aside>

<footer>
  <span id="login-status" onclick="document.getElementById('login-modal').style.display='flex'" style="cursor:pointer;">
    © 2026 Your Portfolio · Click to login
  </span>
</footer>

<div id="login-modal" class="modal-overlay" style="display: none;">
  <div class="login-card">
    <h2>Owner Login</h2>
    <input type="email" id="login-email" placeholder="Email">
    <input type="password" id="login-pass" placeholder="Password">
    <button id="auth-btn">Login</button>
    <button onclick="document.getElementById('login-modal').style.display='none'" class="close-txt">Cancel</button>
  </div>
</div>

  <!-- Firebase (compat version - works without a server) -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <script>
    // Initialize Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyDqex8fvOHREyavy0BsTUqge-Lccu66dM8",
      authDomain: "roselam-47ab1.firebaseapp.com",
      projectId: "roselam-47ab1",
      storageBucket: "roselam-47ab1.firebasestorage.app",
      messagingSenderId: "1072333228569",
      appId: "1:1072333228569:web:995d54b896f21e1ad23888",
      measurementId: "G-7PGL8W8BWF"
    };

    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }

    const auth = firebase.auth();
    const db = firebase.firestore();

    // --- Login ---
    document.getElementById('auth-btn').addEventListener('click', async () => {
      const email = document.getElementById('login-email').value;
      const pass = document.getElementById('login-pass').value;

      if (!email || !pass) {
        alert("Please enter both email and password.");
        return;
      }

      try {
        await auth.signInWithEmailAndPassword(email, pass);
        document.getElementById('login-modal').style.display = 'none';
      } catch (error) {
        alert("Login failed: " + error.message);
      }
    });

    // --- Auth state change ---
    auth.onAuthStateChanged((user) => {
      const adminElements = document.querySelectorAll('.owner-only');
      const loginStatus = document.getElementById('login-status');

      if (user) {
        adminElements.forEach(el => el.style.display = 'block');
        if (loginStatus) {
          loginStatus.textContent = 'Logged in as ' + user.email + ' · Click to logout';
          loginStatus.onclick = () => auth.signOut();
        }
      } else {
        adminElements.forEach(el => el.style.display = 'none');
        if (loginStatus) {
          loginStatus.textContent = '© 2026 Your Portfolio · Click to login';
          loginStatus.onclick = () => {
            document.getElementById('login-modal').style.display = 'flex';
          };
        }
      }
    });

    // --- Contact panel ---
    const contactOpen = document.getElementById('contactOpen');
    const contactClose = document.getElementById('contactClose');
    const contacts = document.getElementById('contacts');

    if (contactOpen) {
      contactOpen.addEventListener('click', () => contacts.classList.add('active'));
    }
    if (contactClose) {
      contactClose.addEventListener('click', () => contacts.classList.remove('active'));
    }

  </script>
</body>
</html>
