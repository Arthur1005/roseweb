<button id="add-project-btn" class="owner-only" style="display:none; position:fixed; bottom:30px; right:30px; font-size:24px; background:#08A4BD; color:#fff; border:none; border-radius:50%; width:48px; height:48px; cursor:pointer; z-index:999;">+</button>

<div id="project-modal" class="modal-overlay" style="display:none;">

<div id="login-modal" class="modal-overlay" style="display:none;">
  <div class="login-card">
    <h2>Owner Login</h2>
    <input type="email" id="login-email" placeholder="Email">
    <input type="password" id="login-pass" placeholder="Password">
    <button id="auth-btn">Login</button>
    <button onclick="document.getElementById('login-modal').style.display='none'" class="close-txt">Cancel</button>

  <!-- Firebase (compat version - works without a server) -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDqex8fvOHREyavy0BsTUqge-Lccu66dM8",
      authDomain: "roselam-47ab1.firebaseapp.com",
      projectId: "roselam-47ab1",
      storageBucket: "roselam-47ab1.firebasestorage.app",
      messagingSenderId: "1072333228569",
      appId: "1:1072333228569:web:995d54b896f21e1ad23888",
      measurementId: "G-7PGL8W8BWF"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const storage = firebase.storage();

    // --- Login ---
    document.getElementById('auth-btn').addEventListener('click', async () => {
      const email = document.getElementById('login-email').value;
      const pass = document.getElementById('login-pass').value;
      if (!email || !pass) { alert("Please enter both email and password."); return; }
      try {
        await auth.signInWithEmailAndPassword(email, pass);
        document.getElementById('login-modal').style.display = 'none';
      } catch (error) {
        alert("Login failed: " + error.message);
      }
    });

    // --- Auth state ---
    auth.onAuthStateChanged((user) => {
      const adminElements = document.querySelectorAll('.owner-only');
      const loginStatus = document.getElementById('login-status');
      if (user) {
        adminElements.forEach(el => el.style.display = 'block');
        if (loginStatus) {
          loginStatus.textContent = 'Logged in as ' + user.email + ' · Click to logout';
          loginStatus.onclick = () => auth.signOut();
        }
      } else {
        adminElements.forEach(el => el.style.display = 'none');
        if (loginStatus) {
          loginStatus.textContent = '© 2026 Your Portfolio · Click to login';
          loginStatus.onclick = () => document.getElementById('login-modal').style.display = 'flex';
        }
      }
    });

    // --- Contact panel ---
    const contactOpen = document.getElementById('contactOpen');
    const contactClose = document.getElementById('contactClose');
    const contacts = document.getElementById('contacts');
    if (contactOpen) contactOpen.addEventListener('click', () => contacts.classList.add('active'));
    if (contactClose) contactClose.addEventListener('click', () => contacts.classList.remove('active'));

    // --- File input preview ---
    const fileInput = document.getElementById('proj-img-file');
    const fileName = document.getElementById('file-name');
    fileInput.addEventListener('change', () => {
      fileName.textContent = fileInput.files[0] ? fileInput.files[0].name : '';
    });

    // --- Add project ---
    const addBtn = document.getElementById('add-project-btn');
    const modal = document.getElementById('project-modal');
    const saveBtn = document.getElementById('save-project');

    addBtn.addEventListener('click', () => modal.style.display = 'flex');

    // Compress image before upload (max 1200px wide, JPEG quality 0.7)
    function compressImage(file, maxWidth, quality) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          let w = img.width;
          let h = img.height;
          if (w > maxWidth) {
            h = Math.round(h * maxWidth / w);
            w = maxWidth;
          }
          canvas.width = w;
          canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          canvas.toBlob(resolve, 'image/jpeg', quality);
        };
        img.src = URL.createObjectURL(file);
      });
    }

    saveBtn.addEventListener('click', async () => {
      const title = document.getElementById('proj-title').value;
      const file = fileInput.files[0];
      if (!title) { alert("Please enter a project title."); return; }

      saveBtn.textContent = 'Creating...';
      saveBtn.disabled = true;

      try {
        let imageUrl = '/assets/img/download.png';

        if (file) {
          const compressed = await compressImage(file, 1200, 0.7);
          const storageRef = storage.ref('project-images/' + Date.now() + '.jpg');
          await storageRef.put(compressed, { contentType: 'image/jpeg' });
          imageUrl = await storageRef.getDownloadURL();
        }

        const docRef = await db.collection("projects").add({
          title: title,
          description: '',
          image: imageUrl,
          video: '',
          pdf: '',
          createdAt: new Date()
        });

        // Auto-redirect to the new project's detail page
        window.location.href = 'projectView.html?id=' + docRef.id;
      } catch (error) {
        alert("Error creating project: " + error.message);
        saveBtn.textContent = 'Create Project';
        saveBtn.disabled = false;
      }
    });

    // --- Load projects into gallery ---
    async function loadProjects() {
      const gallery = document.querySelector('.gallery');
      gallery.querySelectorAll('.from-db').forEach(el => el.remove());

      try {
        const snapshot = await db.collection("projects").orderBy("createdAt", "desc").get();
        snapshot.forEach((doc) => {
          const p = doc.data();
          const div = document.createElement('div');
          div.className = 'from-db';
          div.innerHTML = '<a href="projectView.html?id=' + doc.id + '">' +
            '<img src="' + p.image + '" alt="' + p.title + '"></a>' +
            '<p>' + p.title + '</p>';
          gallery.appendChild(div);
        });
      } catch (error) {
        console.error("Error loading projects:", error);
      }
    }

    loadProjects();
  </script>
</body>
</html>
